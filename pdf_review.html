<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알바케어 - AI PDF 문서 검토</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; color: #1a1a2e; background-color: #f8fafc; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; background-color: #ffffff; border-bottom: 1px solid #f0f0f0; position: fixed; width: 100%; top: 0; z-index: 1000; height: 80px; }
        .logo { font-size: 24px; font-weight: 900; text-decoration: none; color: #1a1a2e; }
        .auth-menu span { font-size: 14px; font-weight: bold; color: #1a365d; }
        
        .review-wrapper { max-width: 800px; margin: 140px auto 100px; padding: 0 20px; }
        .title-section { text-align: center; margin-bottom: 40px; }
        .title-section h1 { font-size: 32px; font-weight: 800; color: #1a365d; margin-bottom: 10px; }
        .title-section p { color: #718096; font-size: 16px; }

        .upload-box { background: #ffffff; border: 3px dashed #3182ce; border-radius: 24px; padding: 50px 30px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { background: #ebf8ff; transform: translateY(-3px); }
        .upload-icon { font-size: 50px; margin-bottom: 15px; }
        .upload-text { font-size: 18px; font-weight: bold; color: #2d3748; margin-bottom: 8px; }
        
        .file-info { margin-top: 20px; display: none; background: #e2e8f0; padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; color: #2b6cb0; }
        .btn-analyze { display: block; width: 100%; padding: 16px; background-color: #1a365d; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .btn-analyze:disabled { background-color: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">AlbaCare</a>
        <div class="auth-menu" id="authMenu"></div>
    </header>

    <main class="review-wrapper">
        <div class="title-section">
            <h1>📄 AI PDF 근로계약서 검토</h1>
            <p>작성된 전자 계약서 PDF 파일을 올려주세요. 정밀 진단 리포트 대시보드로 전환됩니다.</p>
        </div>

        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📁</div>
            <div class="upload-text">전자 문서 PDF 파일 선택하기</div>
        </div>
        <input type="file" id="fileInput" accept=".pdf" style="display: none;">

        <div class="file-info" id="fileInfo"></div>

        <button class="btn-analyze" id="analyzeBtn" disabled>✨ AI에게 PDF 분석 맡기기</button>
    </main>

    <script>
        const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
        if (!loggedInUser) { alert('로그인이 필요한 서비스입니다!'); location.replace('login.html'); }
        else { document.getElementById('authMenu').innerHTML = `<span>${loggedInUser.name} 회원님</span>`; }

        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');

        fileInput.addEventListener('change', function() {
            if (this.files[0]) {
                document.getElementById('fileInfo').style.display = "block";
                document.getElementById('fileInfo').innerText = `📄 선택된 파일: ${this.files[0].name}`;
                analyzeBtn.disabled = false;
            }
        });

        analyzeBtn.addEventListener('click', async function() {
            analyzeBtn.innerHTML = "⏳ AI가 PDF 구조를 분석 중입니다...";
            analyzeBtn.disabled = true;
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('task_type', 'photo_detail');

            try {
                const response = await fetch('https://albacare.onrender.com/analyze', { method: 'POST', body: formData });
                const data = await response.json();
                
                localStorage.setItem('latest_ai_result', data.result);
                location.href = 'review_result.html';
            } catch (error) {
                alert("통신 실패");
                analyzeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
