<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알바케어 - 위험조항 실시간 스캔 결과</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; color: #1a1a2e; background-color: #fff5f5; padding-bottom: 60px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; background-color: #ffffff; border-bottom: 1px solid #edf2f7; height: 80px; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; text-decoration: none; color: #c53030; letter-spacing: -1px; }

        .container { max-width: 800px; margin: 130px auto 0; padding: 0 20px; }
        
        .risk-summary-box {
            background: white; border-radius: 24px; padding: 30px; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: space-between;
            border: 2px solid #feb2b2; box-shadow: 0 10px 25px rgba(229, 62, 62, 0.05);
        }
        .radar-text h1 { font-size: 24px; font-weight: 800; color: #9b2c2c; margin-bottom: 6px; }
        .radar-text p { color: #e53e3e; font-weight: 600; font-size: 15px; }
        
        .risk-count-badge { background-color: #e53e3e; color: white; padding: 15px 25px; border-radius: 50px; font-size: 18px; font-weight: 900; box-shadow: 0 5px 15px rgba(229, 62, 62, 0.3); }

        .risk-card { background: white; border-radius: 20px; padding: 30px; border: 1px solid #f7fafc; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .card-title { font-size: 18px; font-weight: bold; color: #2d3748; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .risk-list-content { font-size: 16px; color: #2d3748; line-height: 1.9; white-space: pre-wrap; background: #fffaf0; padding: 25px; border-radius: 14px; border: 1px solid #feebc8; }

        .btn-box { text-align: center; margin-top: 30px; }
        .btn-back { display: inline-block; padding: 14px 30px; background-color: #c53030; color: white; font-weight: bold; border-radius: 10px; text-decoration: none; transition: 0.2s; }
        .btn-back:hover { background-color: #9b2c2c; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">AlbaCare 🚨</a>
    </header>

    <div class="container">
        <div class="risk-summary-box">
            <div class="radar-text">
                <h1>위법 독소조항 스캔 레이더 결과</h1>
                <p>⚠️ 임금 꺾기, 부당 위약금 등 위법 소지가 포착된 내역입니다.</p>
            </div>
            <div class="risk-count-badge" id="riskCount">스캔 분석 완료</div>
        </div>

        <div class="risk-card">
            <div class="card-title">❌ 근로기준법 위반 의심 리스트 요약</div>
            <div class="risk-list-content" id="riskContent">불러오는 중...</div>
        </div>

        <div class="btn-box">
            <a href="index.html" class="btn-back">확인 완료 (메인으로)</a>
        </div>
    </div>

    <!-- 💡 스캔 결과 매칭 바인딩 최종 스크립트 -->
    <script>
        const riskResult = localStorage.getItem('latest_risk_result');
        const riskContent = document.getElementById('riskContent');
        const riskCount = document.getElementById('riskCount');

        if (riskResult) {
            riskContent.innerText = riskResult;

            if (riskResult.includes("분석 불가한 파일")) {
                riskCount.innerText = "❌ 스캔 불가";
                riskContent.style.color = "#e53e3e";
                riskCount.style.backgroundColor = "#4a5568";
            } else if (riskResult.includes("없음") || riskResult.includes("발견되지 않았습니다") || riskResult.includes("안전")) {
                riskCount.innerText = "✅ 검출 조항 확인";
                riskCount.style.backgroundColor = "#10b981"; // 깨끗하면 안전한 녹색 점등
            } else {
                riskCount.innerText = "⚠️ 독소조항 발견!";
                riskCount.style.backgroundColor = "#e53e3e"; // 위험하면 빨간색 점등
            }
        } else {
            riskContent.innerText = "스캔 기록 데이터가 유실되었습니다. 다시 검사해 주세요.";
        }
    </script>
</body>
</html>
