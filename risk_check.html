<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알바케어 - 위법 위험조항 스캔</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; color: #1a1a2e; background-color: #fff5f5; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; background-color: #ffffff; border-bottom: 1px solid #edf2f7; position: fixed; width: 100%; top: 0; z-index: 1000; height: 80px; }
        .logo { font-size: 24px; font-weight: 900; text-decoration: none; color: #c53030; }
        
        .review-wrapper { max-width: 800px; margin: 140px auto 100px; padding: 0 20px; }
        .title-section { text-align: center; margin-bottom: 40px; }
        .title-section h1 { font-size: 32px; font-weight: 800; color: #c53030; margin-bottom: 10px; }

        .upload-box { background: #ffffff; border: 3px dashed #e53e3e; border-radius: 24px; padding: 50px 30px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { background: #fff5f5; transform: translateY(-3px); }
        .upload-icon { font-size: 50px; margin-bottom: 15px; }

        .btn-analyze { display: block; width: 100%; padding: 16px; background-color: #c53030; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .btn-analyze:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        .file-info { margin-top:20px; text-align:center; font-weight:bold; color:#e53e3e; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo" style="color:#c53030;">AlbaCare 🚨</a>
    </header>

    <main class="review-wrapper">
        <div class="title-section">
            <h1>🚨 위법 및 불리한 위험조항 속성 체크</h1>
            <p>계약서 이미지나 PDF를 올려주세요. 독소 조항만 빠르게 색출하여 전용 위험 리포트로 보여줍니다.</p>
        </div>

        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">⚠️</div>
            <div class="upload-text" style="color:#c53030;">클릭하여 계약서 파일 로드하기</div>
        </div>
        <input type="file" id="fileInput" accept="image/*, .pdf" style="display: none;">

        <div id="fileInfo" class="file-info"></div>

        <button class="btn-analyze" id="analyzeBtn" disabled>⚡ 독소조항 고속 스캔 시작</button>
    </main>

    <script>
        const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
        if (!loggedInUser) { alert('로그인 후 이용 가능합니다.'); location.replace('login.html'); }

        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');

        fileInput.addEventListener('change', function() {
            if (this.files[0]) {
                document.getElementById('fileInfo').innerText = `📁 로드된 파일: ${this.files[0].name}`;
                analyzeBtn.disabled = false;
            }
        });

        analyzeBtn.addEventListener('click', async function() {
            analyzeBtn.innerHTML = "🚨 위법 조항 실시간 추적 레이더 가동 중...";
            analyzeBtn.disabled = true;
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('task_type', 'risk_check');

            try {
                const response = await fetch('https://albacare.onrender.com/analyze', { method: 'POST', body: formData });
                const data = await response.json();
                
                // 💡 위험조항 전용 결과창으로 데이터 토스
                localStorage.setItem('latest_risk_result', data.result);
                location.href = 'risk_result.html';
            } catch (error) {
                alert("연동 실패");
                analyzeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
