<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알바케어 - 계약서 3줄 요약</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; color: #1a1a2e; background-color: #f0fdf4; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; background-color: #ffffff; border-bottom: 1px solid #edf2f7; position: fixed; width: 100%; top: 0; z-index: 1000; height: 80px; }
        .logo { font-size: 24px; font-weight: 900; text-decoration: none; color: #059669; }
        
        .review-wrapper { max-width: 800px; margin: 140px auto 100px; padding: 0 20px; }
        .title-section { text-align: center; margin-bottom: 40px; }
        .title-section h1 { font-size: 32px; font-weight: 800; color: #065f46; margin-bottom: 10px; }

        .upload-box { background: #ffffff; border: 3px dashed #34d399; border-radius: 24px; padding: 50px 30px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { background: #e6fbf1; transform: translateY(-3px); }
        .upload-icon { font-size: 50px; margin-bottom: 15px; }

        .btn-analyze { display: block; width: 100%; padding: 16px; background-color: #059669; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .btn-analyze:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        .file-info { margin-top:20px; text-align:center; font-weight:bold; color:#059669; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">AlbaCare 📝</a>
    </header>

    <main class="review-wrapper">
        <div class="title-section">
            <h1>📝 알바계약서 핵심 조건 초고속 요약</h1>
            <p>파일을 올리면 필수 계약 정보만 3~5줄 요약 노트패드로 보기 쉽게 압축해 드립니다.</p>
        </div>

        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📝</div>
            <div class="upload-text" style="color:#059669;">여기를 눌러 계약서 파일 업로드</div>
        </div>
        <input type="file" id="fileInput" accept="image/*, .pdf" style="display: none;">

        <div id="fileInfo" class="file-info"></div>

        <button class="btn-analyze" id="analyzeBtn" disabled>⚡ 계약서 핵심 3줄 요약하기</button>
    </main>

    <script>
        const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
        if (!loggedInUser) { alert('로그인이 필요한 서비스입니다.'); location.replace('login.html'); }

        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');

        fileInput.addEventListener('change', function() {
            if (this.files[0]) {
                document.getElementById('fileInfo').innerText = `📁 확인된 문서: ${this.files[0].name}`;
                analyzeBtn.disabled = false;
            }
        });

        analyzeBtn.addEventListener('click', async function() {
            analyzeBtn.innerHTML = "⏳ AI가 핵심 데이터만 골라 요약 수첩을 만드는 중입니다...";
            analyzeBtn.disabled = true;
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('task_type', 'summary');

            try {
                const response = await fetch('https://albacare.onrender.com/analyze', { method: 'POST', body: formData });
                const data = await response.json();
                
                // 💡 요약 수첩 전용 결과창으로 데이터 토스
                localStorage.setItem('latest_summary_result', data.result);
                location.href = 'summary_result.html';
            } catch (error) {
                alert("통신 실패");
                analyzeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
