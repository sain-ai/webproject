<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알바케어 - 계약서 초고속 요약본</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; color: #1a1a2e; background-color: #f0fdf4; padding-bottom: 60px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; background-color: #ffffff; border-bottom: 1px solid #edf2f7; height: 80px; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; text-decoration: none; color: #059669; letter-spacing: -1px; }

        .container { max-width: 750px; margin: 130px auto 0; padding: 0 20px; }
        
        .summary-header-box { background: white; border-radius: 22px; padding: 25px 30px; margin-bottom: 25px; border: 1px solid #d1fae5; box-shadow: 0 10px 25px rgba(4, 120, 87, 0.02); text-align: center; }
        .summary-header-box h1 { font-size: 24px; font-weight: 800; color: #065f46; margin-bottom: 4px; }
        .summary-header-box p { color: #059669; font-size: 14px; font-weight: 600; }

        .notepad-card { background: white; border-radius: 24px; padding: 35px; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px rgba(0,0,0,0.01); position: relative; }
        .notepad-card::before { content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 6px; background-image: radial-gradient(#cbd5e1 3px, transparent 3px); background-size: 15px 15px; }
        
        .notepad-title { font-size: 18px; font-weight: bold; color: #065f46; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; border-bottom: 2px dashed #a7f3d0; padding-bottom: 10px; }
        .summary-text-content { font-size: 16px; color: #2d3748; line-height: 2; white-space: pre-wrap; padding: 5px; }

        .btn-box { text-align: center; margin-top: 30px; }
        .btn-back { display: inline-block; padding: 14px 35px; background-color: #059669; color: white; font-weight: bold; border-radius: 10px; text-decoration: none; transition: 0.2s; box-shadow: 0 5px 15px rgba(5, 192, 105, 0.2); }
        .btn-back:hover { background-color: #047857; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">AlbaCare 📝</a>
    </header>

    <div class="container">
        <div class="summary-header-box">
            <h1>핵심 근로조건 요약 수첩</h1>
            <p>복잡하고 어려운 법률 용어를 빼고 알바생 눈높이에서 간결히 정리했습니다.</p>
        </div>

        <div class="notepad-card">
            <div class="notepad-title">📋 내 알바 조건 요약 브리핑</div>
            <div class="summary-text-content" id="summaryContent">요약 데이터를 가져오는 중입니다...</div>
        </div>

        <div class="btn-box">
            <a href="index.html" class="btn-back">내용 확인 완료</a>
        </div>
    </div>

    <!-- 💡 요약 수첩 최종 매칭 바인딩 스크립트 -->
    <script>
        const summaryResult = localStorage.getItem('latest_summary_result');
        const summaryContent = document.getElementById('summaryContent');

        if (summaryResult) {
            summaryContent.innerText = summaryResult;
            if (summaryResult.includes("분석 불가한 파일")) {
                summaryContent.style.color = "#e53e3e"; // 엉뚱한 파일인 경우 에러 컬러 표시
            }
        } else {
            summaryContent.innerText = "요약 수첩에 기록할 내용이 비어있습니다. 다시 실행해 주세요.";
        }
    </script>
</body>
</html>
