<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알바케어 - AI 사진 계약서 검토</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; color: #1a1a2e; background-color: #f8fafc; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; background-color: #ffffff; border-bottom: 1px solid #f0f0f0; position: fixed; width: 100%; top: 0; z-index: 1000; height: 80px; }
        .logo { font-size: 24px; font-weight: 900; text-decoration: none; color: #1a1a2e; letter-spacing: -1px; }
        .auth-menu span { font-size: 14px; font-weight: bold; color: #1a365d; }
        
        .review-wrapper { max-width: 800px; margin: 140px auto 100px; padding: 0 20px; }
        .title-section { text-align: center; margin-bottom: 40px; }
        .title-section h1 { font-size: 32px; font-weight: 800; color: #1a365d; margin-bottom: 10px; }
        .title-section p { color: #718096; font-size: 16px; }

        .upload-box { background: #ffffff; border: 3px dashed #10b981; border-radius: 24px; padding: 50px 30px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        .upload-box:hover { background: #f0fdf4; transform: translateY(-3px); }
        .upload-icon { font-size: 50px; margin-bottom: 15px; }
        .upload-text { font-size: 18px; font-weight: bold; color: #2d3748; margin-bottom: 8px; }
        .upload-sub { font-size: 14px; color: #a0aec0; }

        .preview-zone { margin-top: 30px; display: none; text-align: center; }
        .preview-img { max-width: 100%; max-height: 400px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .btn-analyze { display: block; width: 100%; padding: 16px; background-color: #1a365d; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-analyze:hover:not(:disabled) { background-color: #2c5282; }
        .btn-analyze:disabled { background-color: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">AlbaCare</a>
        <div class="auth-menu" id="authMenu"></div>
    </header>

    <main class="review-wrapper">
        <div class="title-section">
            <h1>🔍 AI 사진 근로계약서 정밀 검토</h1>
            <p>스마트폰으로 계약서를 촬영해 주세요. AI 노무사가 독소 조항을 정밀 분석 대시보드로 보여드립니다.</p>
        </div>

        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📷</div>
            <div class="upload-text">사진 찍기 (또는 계약서 이미지 선택)</div>
            <div class="upload-sub">지원 형식: JPG, PNG, JPEG</div>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">

        <div class="preview-zone" id="previewZone">
            <img src="" id="imagePreview" class="preview-img">
        </div>

        <button class="btn-analyze" id="analyzeBtn" disabled>✨ AI에게 정밀 검토 맡기기</button>
    </main>

    <script>
        const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
        if (!loggedInUser) { alert('로그인이 필요한 서비스입니다!'); location.replace('login.html'); }
        else { document.getElementById('authMenu').innerHTML = `<span>${loggedInUser.name} 회원님</span>`; }

        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('previewZone').style.display = "block";
                    analyzeBtn.disabled = false;
                }
                reader.readAsDataURL(file);
            }
        });

        analyzeBtn.addEventListener('click', async function() {
            analyzeBtn.innerHTML = "⏳ AI가 계약서를 정밀 판독 중입니다...";
            analyzeBtn.disabled = true;
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('task_type', 'photo_detail');

            try {
                const response = await fetch('https://albacare.onrender.com/analyze', { method: 'POST', body: formData });
                const data = await response.json();
                
                // 💡 핵심: 결과를 로컬스토리지에 임시 저장하고 대시보드 창으로 화면 전환
                localStorage.setItem('latest_ai_result', data.result);
                location.href = 'review_result.html';
            } catch (error) {
                alert("서버 연결 실패. 백엔드를 확인해 주세요.");
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = "✨ AI에게 정밀 검토 맡기기";
            }
        });
    </script>
</body>
</html>
